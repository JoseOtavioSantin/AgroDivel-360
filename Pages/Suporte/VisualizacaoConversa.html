<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#2c2f3f" />
  <title>Visualização de Conversa do Suporte</title>
  <link rel="icon" type="image/png" href="/assets/images/iconeaba.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    body { background: #f5f7fa; }
    .conversa-container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(25,59,124,0.08); padding: 32px 28px; }
    .conversa-header { font-size: 22px; font-weight: bold; color: #193b7c; margin-bottom: 18px; }
    .chat-messages { min-height: 200px; max-height: 500px; overflow-y: auto; background: #f9fafb; border-radius: 8px; padding: 24px 18px; display: flex; flex-direction: column; gap: 16px; }
    .mensagem-grupo { display: flex; flex-direction: column; gap: 2px; }
    .mensagem-bubble { max-width: 70%; padding: 12px 18px; border-radius: 14px; font-size: 15px; line-height: 1.5; background: #e3f2fd; color: #1a202c; align-self: flex-start; }
    .mensagem-suporte .mensagem-bubble { background: #193b7c; color: #fff; align-self: flex-end; }
    .mensagem-meta { font-size: 11px; color: #8b92a9; margin-top: 2px; }
    .mensagem-suporte .mensagem-meta { text-align: right; }
    .mensagem-usuario .mensagem-meta { text-align: left; }
    .vazio-aviso { text-align: center; color: #a0aec0; padding: 40px 20px; font-size: 14px; font-style: italic; }
  </style>
</head>
<body>
  <nav id="sidebar-placeholder"></nav>
  <section class="home">
    <div class="text">
      <h1>Solicitação Resolvida</h1>
      <p>Visualize a conversa e os detalhes da solicitação de suporte abaixo.</p>
    </div>
    <div class="content-card" style="width:100%; margin-bottom:32px;">
      <div class="content-card-header" style="margin-bottom:0;">
        <h2 style="font-size:1.6rem;font-weight:700;color:#193b7c;margin-bottom:2px; letter-spacing:-1px;">Detalhes da Solicitação</h2>
      </div>
      <div class="content-card-body" style="padding-top:0;">
        <div id="detalhes-solicitacao" class="detalhes-solicitacao-card" style="margin-bottom:28px; background:#f8fafc; border-radius:8px; padding:18px 18px 10px 18px; border:1px solid #f0f0f0;">
          <!-- Detalhes preenchidos via JS -->
        </div>
        <div class="chat-messages" id="chat-messages" style="margin-top:10px;">
          <div class="vazio-aviso">Carregando mensagens...</div>
        </div>
      </div>
    </div>
  </section>
  <!-- Lightbox Modal -->
  <div id="lightbox-modal" style="display:none;position:fixed;z-index:9999;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;">
    <img id="lightbox-img" src="" alt="Visualização" style="max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 4px 32px #0008;">
  </div>
  <script type="module" src="/assets/js/firebase-config.js"></script>
  <script type="module" src="/assets/js/auth.js"></script>
  <script type="module" src="/assets/js/components/Sidebar.js"></script>
  <script type="module" src="/assets/js/main.js"></script>
  <script type="module">

    import { db } from '/assets/js/firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // Pegar ID da solicitação da URL
    const params = new URLSearchParams(window.location.search);
    const solicitacaoId = params.get('id');

    async function carregarConversa() {
      if (!solicitacaoId) {
        document.getElementById('chat-messages').innerHTML = '<div class="vazio-aviso">ID da solicitação não fornecido</div>';
        return;
      }
      try {
        const docRef = doc(db, 'SolicitaçõesSuporte', solicitacaoId);
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists()) {
          document.getElementById('chat-messages').innerHTML = '<div class="vazio-aviso">Solicitação não encontrada</div>';
          return;
        }
        const solicitacao = docSnap.data();
        renderizarDetalhes(solicitacao);
        renderizarChat(solicitacao);
      } catch (error) {
        document.getElementById('chat-messages').innerHTML = `<div class='vazio-aviso'>Erro ao carregar conversa<br><small>${error.message}</small></div>`;
      }
    }

    function renderizarDetalhes(solicitacao) {
      // Exibir imagens anexadas, se houver
      const imagens = solicitacao.imagens && solicitacao.imagens.length > 0
        ? solicitacao.imagens.map(url => `<img src="${url}" class="imagem-thumb" style="max-width:90px;max-height:90px;margin:4px;border-radius:6px;box-shadow:0 2px 8px #0001;cursor:pointer;" onclick="abrirLightbox('${url}')" alt="Imagem">`).join('')
        : '<span style="color:#a0aec0;font-size:13px;">Nenhuma imagem anexada</span>';

      // Mensagem de erro (se existir)
      const erro = solicitacao.erro || solicitacao.mensagemErro || '';
      const erroHtml = erro ? `<div style=\"margin-bottom:10px;\"><b>Mensagem de Erro:</b><br>${erro}</div>` : '';

      // Rotina (se existir)
      const rotina = solicitacao.rotina || '';
      const rotinaHtml = rotina ? `<div style=\"margin-bottom:10px;\"><b>Rotina:</b> ${rotina}</div>` : '';

      document.getElementById('detalhes-solicitacao').innerHTML = `
        ${rotinaHtml}
        ${erroHtml}
        <div style=\"margin-bottom:10px;\"><b>Imagens anexadas:</b><br>${imagens}</div>
        <div style=\"margin-bottom:10px;\"><b>Descrição:</b><br>${solicitacao.descricao || 'Sem descrição'}</div>
      `;
    }

    function renderizarChat(solicitacao) {
      const historico = solicitacao.historico || [];
      const respostas = historico.filter(h => h.tipo === 'resposta');
      if (respostas.length === 0) {
        document.getElementById('chat-messages').innerHTML = '<div class="vazio-aviso">Nenhuma mensagem ainda</div>';
        return;
      }
      const html = respostas.map(h => {
        const dataResposta = h.data?.toDate ? h.data.toDate().toLocaleString('pt-BR') : (h.data ? new Date(h.data).toLocaleString('pt-BR') : 'N/A');
        return `
          <div class="mensagem-grupo">
            <div class="mensagem-bubble">${h.mensagem || ''}</div>
            <div class="mensagem-meta">${dataResposta}</div>
          </div>
        `;
      }).join('');
      document.getElementById('chat-messages').innerHTML = html;
      document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
    }

    window.abrirLightbox = function(url) {
      const modal = document.getElementById('lightbox-modal');
      const img = document.getElementById('lightbox-img');
      img.src = url;
      modal.style.display = 'flex';
      modal.onclick = () => { modal.style.display = 'none'; img.src = ''; };
    };

    carregarConversa();
  </script>
</body>
</html>
