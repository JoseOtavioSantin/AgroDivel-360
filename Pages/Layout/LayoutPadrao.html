<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Tarefa - Ritmo da Semana</title>
    <link rel="icon" type="image/png" href="/assets/images/iconeaba.png">
    
    <!-- CSS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/Pages/Formularios/form-ritmo.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Botão flutuante de suporte -->
    <div id="chamar-suporte-placeholder"></div>
    <script>
            fetch('/assets/components/ChamarSuporte.html')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('chamar-suporte-placeholder').innerHTML = html;
                    const scripts = document.getElementById('chamar-suporte-placeholder').querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                });
    </script>

    <!-- Placeholder onde a Sidebar será carregada -->
    <nav id="sidebar-placeholder"></nav>

    <section class="home">
        <div class="text">
            <h1>Adicionar Nova Tarefa</h1>
            <p>Preencha os dados abaixo para registrar uma atividade no calendário.</p>
        </div>

    <!-- SCRIPTS -->
    <script type="module" src="/assets/js/firebase-config.js"></script>
    <script type="module" src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/components/Sidebar.js"></script>
    <script type="module" src="/assets/js/Formularios/form-ritmo.js"></script>

</body>
</html>
